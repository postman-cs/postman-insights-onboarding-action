name: 'Postman Onboarding: Insights Linking'
description: Link Postman Insights discovered services to workspaces and git repos. Part of the Postman API Onboarding suite.
author: Postman
branding:
  icon: link
  color: orange
inputs:
  project-name:
    description: 'Service name or Jira/Xray project key to match against the final discovered-service segment'
    required: true
  workspace-id:
    description: 'Postman workspace ID to link the discovered service to'
    required: true
  environment-id:
    description: 'Postman environment UID for the onboarding association'
    required: true
  system-environment-id:
    description: 'Postman system environment UUID for service-level Insights acknowledgment'
    required: false
  cluster-name:
    description: 'Insights cluster name. When set, matches {cluster-name}/{project-name} exactly in discovered services'
    required: false
  repo-url:
    description: 'Repository URL for Git onboarding. Auto-detected from CI context when omitted.'
    required: false
  postman-access-token:
    description: 'Required human-user session access token (x-access-token) for Bifrost and Akita linking calls. Service-account tokens are rejected and this action never mints or refreshes a token from a PMAK.'
    required: false
  postman-team-id:
    description: 'Explicit Postman team ID for org-mode integration request headers. When omitted, x-entity-team-id is not sent.'
    required: false
  github-token:
    description: 'Optional GitHub token passed as git_api_key when repository auth is required by onboarding/git'
    required: false
  postman-api-key:
    description: 'Human-user Postman API key (PMAK-*) for observability application binding. It must resolve to the same human user as postman-access-token; service-account PMAKs are rejected.'
    required: false
  create-api-key:
    description: 'Explicit opt-in to create a durable Bifrost API key when postman-api-key is omitted or invalid. Default false — never creates timestamp-named orphan keys on ordinary runs. Supported values: true, false.'
    required: false
    default: 'false'
  credential-preflight:
    description: 'Credential identity preflight policy. Both modes require a human-user access token with consumerType=user; enforce additionally fails on parent-org mismatch.'
    required: false
    default: 'enforce'
  service-not-found-policy:
    description: 'Behavior when the discovered service is absent after polling. fail (default) aborts full linking; warn returns status=not-found without writes. Supported values: fail, warn.'
    required: false
    default: 'fail'
  poll-timeout-seconds:
    description: 'Maximum seconds to wait for the service to appear in the discovered list'
    required: false
    default: '120'
  poll-interval-seconds:
    description: 'Seconds between discovery polling attempts'
    required: false
    default: '10'
  postman-region:
    description: 'Postman data residency region for public API calls. One of: us or eu.'
    required: false
    default: 'us'
  postman-stack:
    description: 'Postman stack profile. Defaults to the public production stack. Marketplace workflows should leave this as prod.'
    required: false
    default: 'prod'
  branch-strategy:
    description: Branch-aware sync strategy. legacy (default) keeps branch-blind behavior; publish-gate restricts canonical writes to the canonical branch and skips on other branches; preview additionally maintains suffixed per-branch preview asset sets.
    required: false
    default: legacy
  canonical-branch:
    description: Explicit canonical branch (the sole writer of canonical assets). Defaults to the provider-resolved default branch.
    required: false
  channels:
    description: Comma-separated channel map for long-lived promotion branches.
    required: false
outputs:
  discovered-service-id:
    description: 'Numeric ID from the API Catalog discovered-services list'
  discovered-service-name:
    description: 'Full cluster/service name of the discovered service'
  collection-id:
    description: 'Collection ID returned by the prepare-collection step'
  application-id:
    description: 'Insights application binding ID from the observability API'
  verification-token:
    description: 'Insights team verification token (tvt_*) for DaemonSet telemetry'
  status:
    description: 'Onboarding result: success, not-found, or error'
  sync-status:
    description: 'Branch-aware sync status: synced, skipped-branch-gate, or empty under branch-strategy legacy.'
  branch-decision:
    description: Serialized BranchDecision JSON for downstream actions (also exported as POSTMAN_BRANCH_DECISION).
runs:
  using: 'node24'
  main: 'dist/action.cjs'
