name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so commitlint can lint the PR commit range.
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Install actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.11 "$RUNNER_TEMP"
          echo "ACTIONLINT_BIN=$RUNNER_TEMP/actionlint" >> "$GITHUB_ENV"
      # Bundle once before fan-out. Typecheck runs exactly once in the queue.
      - run: npm run bundle
      # Keep at most two checks active on the two-vCPU runner. Failures aggregate
      # under ::group:: logs so one pass still shows every result.
      - name: Run gates
        run: |
          set -uo pipefail
          declare -A pid=()
          declare -A result=()
          declare -a names=()
          MAX_PARALLEL_GATES=2
          finish_one() {
            local finished_pid status n
            if wait -n -p finished_pid "${pid[@]}"; then status=0; else status=$?; fi
            for n in "${!pid[@]}"; do
              if [ "${pid[$n]}" = "$finished_pid" ]; then
                result[$n]=$status
                unset 'pid[$n]'
                return
              fi
            done
          }
          run() {
            while [ "${#pid[@]}" -ge "$MAX_PARALLEL_GATES" ]; do finish_one; done
            local n=$1; shift
            names+=("$n")
            ( "$@" ) >"$n.log" 2>&1 & pid[$n]=$!
          }

          run lint       npm run lint
          run typecheck  npm run typecheck
          run test       npm test
          run dist       npm run verify:dist:assert
          run actionlint "$ACTIONLINT_BIN"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            run commitlint npx commitlint \
              --from "${{ github.event.pull_request.base.sha }}" \
              --to "${{ github.event.pull_request.head.sha }}"
          fi

          while [ "${#pid[@]}" -gt 0 ]; do finish_one; done
          fail=0
          for n in "${names[@]}"; do
            if [ "${result[$n]}" -eq 0 ]; then echo "gate:$n=pass"; else echo "gate:$n=fail"; fail=1; fi
          done
          for n in "${names[@]}"; do
            echo "::group::$n"; cat "$n.log"; echo "::endgroup::"
          done
          exit $fail

  windows:
    name: Windows gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm run bundle
      - name: Run gates
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $MAX_PARALLEL_GATES = 2
          $gates = @(
            @{ Name = 'lint' },
            @{ Name = 'test' },
            @{ Name = 'typecheck' },
            @{ Name = 'dist' }
          )
          $running = @()
          $results = @{}
          foreach ($gate in $gates) {
            while ($running.Count -ge $MAX_PARALLEL_GATES) {
              $completed = Wait-Job -Job $running -Any
              Receive-Job $completed | Write-Output
              $results[$completed.Name] = if ($completed.State -eq 'Completed') { 0 } else { 1 }
              Remove-Job $completed
              $running = @($running | Where-Object Id -ne $completed.Id)
            }
            $running += Start-Job -Name $gate.Name -ScriptBlock {
              param($name)
              switch ($name) {
                'lint' { npm run lint }
                'test' { npm test }
                'typecheck' { npm run typecheck }
                'dist' { npm run verify:dist:assert }
                default { throw "unknown gate: $name" }
              }
              if ($LASTEXITCODE -ne 0) { throw "gate $name failed: $LASTEXITCODE" }
            } -ArgumentList $gate.Name
          }
          foreach ($job in $running) {
            Wait-Job $job | Out-Null
            Receive-Job $job | Write-Output
            $results[$job.Name] = if ($job.State -eq 'Completed') { 0 } else { 1 }
            Remove-Job $job
          }
          $failed = $false
          foreach ($gate in $gates) {
            if ($results[$gate.Name] -eq 0) { Write-Output "gate:$($gate.Name)=pass" } else { Write-Output "gate:$($gate.Name)=fail"; $failed = $true }
          }
          if ($failed) { exit 1 }
      - name: Upload expected dist on mismatch
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: expected-dist
          path: dist/
