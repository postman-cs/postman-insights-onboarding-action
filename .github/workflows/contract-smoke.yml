name: Contract Smoke Tests
on:
  schedule:
    - cron: '0 8 * * *'   # daily at 8 AM UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  preflight:
    name: Smoke credential preflight
    runs-on: ubuntu-latest
    outputs:
      run_smoke: ${{ steps.credentials.outputs.run_smoke }}
    steps:
      - id: credentials
        name: Check required smoke secrets
        env:
          SMOKE_ORG_API_KEY: ${{ secrets.SMOKE_ORG_API_KEY }}
        run: |
          set -euo pipefail
          run_smoke=true
          missing=()
          allow_skip=false
          missing_required=false

          if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            allow_skip=true
          fi

          if [ -z "${SMOKE_ORG_API_KEY:-}" ]; then
            if [ "$allow_skip" = "true" ]; then
              echo "::notice::Skipping Insights contract smoke: SMOKE_ORG_API_KEY is not configured."
            else
              echo "::error::Cannot run Insights contract smoke: SMOKE_ORG_API_KEY is not configured."
              missing_required=true
            fi
            run_smoke=false
            missing+=("SMOKE_ORG_API_KEY")
          fi

          {
            echo "### Insights contract smoke"
            if [ "$run_smoke" = "true" ]; then
              echo "All required smoke secrets are configured. Live contract checks will run."
            else
              echo "Skipping live contract checks because required smoke secrets are missing."
              printf -- '- %s\n' "${missing[@]}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$missing_required" = "true" ]; then
            exit 1
          fi

          echo "run_smoke=$run_smoke" >> "$GITHUB_OUTPUT"

  api-contract-smoke:
    name: Insights API Contract
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ needs.preflight.outputs.run_smoke == 'true' }}
    steps:
      - uses: actions/checkout@v7
      - id: postman-token
        uses: postman-cs/postman-resolve-service-token-action@v2
        with:
          postman-api-key: ${{ secrets.SMOKE_ORG_API_KEY }}
      - name: Verify GET /me
        env:
          PMAK: ${{ secrets.SMOKE_ORG_API_KEY }}
        run: |
          set -euo pipefail
          response=$(curl -sf -H "X-Api-Key: $PMAK" https://api.getpostman.com/me)
          echo "$response" | jq -e '.user.teamId' > /dev/null || { echo "CONTRACT DRIFT: GET /me missing user.teamId"; exit 1; }
          echo "GET /me: OK"

      - name: Verify GET /teams (org-mode)
        env:
          PMAK: ${{ secrets.SMOKE_ORG_API_KEY }}
        run: |
          set -euo pipefail
          response=$(curl -sf -H "X-Api-Key: $PMAK" https://api.getpostman.com/teams)
          echo "$response" | jq -e '.data | type == "array"' > /dev/null || { echo "CONTRACT DRIFT: GET /teams .data is not an array"; exit 1; }
          count=$(echo "$response" | jq '.data | length')
          if [ "$count" -gt 1 ]; then
            org_count=$(echo "$response" | jq '[.data[] | select(.organizationId != null)] | length')
            [ "$org_count" -gt 0 ] || { echo "CONTRACT DRIFT: multi-team response lacks organizationId"; exit 1; }
          fi
          echo "GET /teams: $count teams, OK"

      - name: Verify session endpoint
        env:
          ACCESS_TOKEN: ${{ steps.postman-token.outputs.token }}
        run: |
          set -euo pipefail
          response=$(curl -sf \
            -H "x-access-token: $ACCESS_TOKEN" \
            https://iapub.postman.co/api/sessions/current)
          echo "$response" | jq -e '.session.identity.team' > /dev/null || {
            echo "CONTRACT DRIFT: iapub session endpoint missing session.identity.team"
            echo "Response keys: $(echo "$response" | jq 'keys')"
            exit 1
          }
          echo "Session validation: OK"

      - name: Verify Bifrost API key creation
        env:
          ACCESS_TOKEN: ${{ steps.postman-token.outputs.token }}
        run: |
          set -euo pipefail
          ts=$(date +%s)
          response=$(curl -sf -X POST \
            -H "x-access-token: $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"method\":\"POST\",\"path\":\"/scim/v2/keys\",\"body\":{\"name\":\"smoke-insights-${ts}\",\"description\":\"Contract smoke - safe to delete\"}}" \
            https://bifrost-premium-https-v4.gw.postman.com)
          key=$(echo "$response" | jq -r '.apikey.key // .key // empty')
          [ -n "$key" ] || { echo "CONTRACT DRIFT: Bifrost key creation did not return apikey.key"; echo "$response" | head -c 500; exit 1; }
          echo "Bifrost key creation: OK"
